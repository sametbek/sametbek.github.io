<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Socials</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">
    <nav>
        <h2 class="logo">SamBek.</h2>
        <ul>
            <li><a href="https://sametbek.github.io/#home">Home</a></li>
        </ul>
        <img src="pictures/light-button.png" id="darkModeToggle" class="theme-icon" alt="Toggle Theme">
        <img src="pictures/light-home-button.png" id="homeNav" class="home-icon" alt="Go Home">
    </nav>
    <section id="projects" class="projects-wrapper bg-light">
        <div class="projects-bg">
            <lottie-player src="pictures/projects-animation.json" background="transparent" speed="1" loop autoplay preserveAspectRatio="xMidYMid slice"></lottie-player>
        </div>
        <div class="projects-content section-padding">
            <h2>All Socials</h2>
            <div class="project-grid">
                <div class="card">
                    <h3>Instagram</h3>
                    <a href="https://www.instagram.com/sambeknet" target="_blank" class="btn-small">@sambeknet</a>
                </div>
                <div class="card">
                    <h3>X</h3>
                    <a href="https://www.x.com/sambeknet" target="_blank" class="btn-small">@sambeknet</a>
                </div>
                <div class="card">
                    <h3>Pinterest</h3>
                    <a href="https://www.pinterest.com/sambeknet" target="_blank" class="btn-small">@sambeknet</a>
                </div>
                <div class="card">
                    <h3>Linkedin</h3>
                    <a href="https://www.pinterest.com/sambeknet" target="_blank" class="btn-small">@sambeknet</a>
                </div>
                <div class="card">
                    <h3>Tiktok</h3>
                    <a href="https://www.tiktok.com/@sambeknet" target="_blank" class="btn-small">@sambeknet</a>
                </div>
            </div>
        </div>
    </section>
    <footer>
        <p>&copy; 2026 Samet Bekiroğlu.</p>
    </footer>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <script src="script.js"></script>
</body>
</html>
