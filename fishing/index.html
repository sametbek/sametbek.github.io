<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sambeknet.github.io/fishing</title>
    <link rel="icon" href="images/logo.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="custom-cursor"></div>

    <nav class="centered-nav" id="pageNav">
      <a class="nav-brand" href="javascript:void(0)">
          <span class="brand-container">
              <span class="brand-normal">sambeknet.github.io</span>
              <span class="brand-pixel">sambeknet.github.io</span>
          </span>
          <span class="fishing-text">/fishing</span>
      </a>
      
      <a class="nav-placeholder interactable" id="game-toggle-btn" href="javascript:void(0)" aria-label="Fishing">
          <span class="icon-emoji">🎣</span>
          <img class="icon-img" src="images/rod.png" alt="Rod">
      </a>
    </nav>

    <div id="ui-layer">
        <div id="top-left">
            <button id="stats-button" class="glass-btn icon-btn interactable"><img src="images/stats.png" alt="Stats"></button>
            <div id="stats-menu" class="hidden-menu glass-panel">
                <h3>Statistics</h3>
                <p>Time Played: <span id="stat-time">0h 0m 0s</span></p>
                <p>Manual Fish: <span id="stat-manual">0</span></p>
                <p>Total Fish: <span id="stat-total">0</span></p>
                <p>Total Gold: <span id="stat-total-gold">0</span></p>
            </div>
        </div>

        <div id="top-right">
            <div class="top-row">
                <div id="debug-menu" class="hidden-menu glass-panel">
                    <button id="debug-close" class="glass-btn interactable">X</button>
                    <h3 style="margin-top:0;">Dev Debug</h3>
                    <input type="number" id="debug-gold-input" placeholder="Set Gold" class="glass-input interactable">
                    <input type="number" id="debug-fish-input" placeholder="Set Total Fish" class="glass-input interactable">
                    <button id="debug-save" class="glass-btn interactable" style="width: 100%; margin-bottom:5px;">Save</button>
                    <button id="debug-package" class="glass-btn interactable" style="width: 100%; margin-bottom:5px; background: rgba(50, 205, 50, 0.3);">Spawn Package</button>
                    <button id="debug-delete" class="glass-btn red-btn interactable" style="width: 100%;">Delete Save</button>
                    <div id="debug-info"></div>
                </div>

                <div id="gold-counter" class="glass-panel">
                    <img src="images/gold.png" alt="Gold"> <span id="current-gold">0</span>
                </div>
                <button id="shop-button" class="glass-btn icon-btn interactable"><img src="images/shop.png" alt="Shop"></button>
            </div>

            <div id="shop-menu" class="hidden-menu glass-panel">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px;">
                    <h3 id="shop-title" style="margin:0;">Upgrades</h3>
                    <button id="shop-toggle-btn" class="glass-btn icon-btn interactable" style="padding: 5px;">
                        <img id="shop-toggle-img" src="images/boat1.png" style="width: 24px; height: 24px; object-fit: contain;" alt="Skins">
                    </button>
                </div>
                
                <div id="upgrades-container">
                    <button id="upg-water" class="glass-btn shop-btn interactable">
                        <span class="shop-name">Water Level</span>
                        <div class="shop-details">
                            <span class="shop-cost" id="cost-water-container"><img src="images/gold.png"> <span id="cost-water">10</span></span>
                            <span class="shop-lvl" id="lvl-water">LVL 1</span>
                        </div>
                    </button>

                    <button id="upg-auto" class="glass-btn shop-btn interactable">
                        <span class="shop-name">Auto Fishing</span>
                        <div class="shop-details">
                            <span class="shop-cost" id="cost-auto-container"><img src="images/gold.png"> <span id="cost-auto">10</span></span>
                            <span class="shop-lvl" id="lvl-auto">LVL 0</span>
                        </div>
                    </button>

                    <button id="upg-net" class="glass-btn shop-btn interactable">
                        <span class="shop-name">The Net</span>
                        <div class="shop-details">
                            <span class="shop-cost" id="cost-net-container"><img src="images/gold.png"> <span id="cost-net">10</span></span>
                            <span class="shop-lvl" id="lvl-net">LVL 1</span>
                        </div>
                    </button>

                    <button id="upg-golden" class="glass-btn shop-btn interactable">
                        <span class="shop-name">Golden Chance</span>
                        <div class="shop-details">
                            <span class="shop-cost" id="cost-golden-container"><img src="images/gold.png"> <span id="cost-golden">10</span></span>
                            <span class="shop-lvl" id="lvl-golden">LVL 1</span>
                        </div>
                    </button>
                </div>

                <div id="skins-container" style="display: none;">
                    
                    <button class="glass-btn shop-btn interactable skin-btn" data-skin="1">
                        <div style="display:flex; align-items:center; gap:10px;">
                            <span class="shop-name">Canoe</span>
                            <img src="images/boat1.png" style="width:24px; height:24px; object-fit:contain;">
                        </div>
                        <div class="shop-details">
                            <span class="skin-status skin-owned" id="skin-status-1">OWNED</span>
                        </div>
                    </button>

                    <button class="glass-btn shop-btn interactable skin-btn" data-skin="2">
                        <div style="display:flex; align-items:center; gap:10px;">
                            <span class="shop-name">Sailboat</span>
                            <img src="images/boat2.png" style="width:24px; height:24px; object-fit:contain;">
                        </div>
                        <div class="shop-details">
                            <span class="shop-cost skin-cost" id="skin-cost-2"><img src="images/rod.png"> 100</span>
                            <span class="skin-status skin-owned" id="skin-status-2" style="display:none;">USE</span>
                        </div>
                    </button>

                    <button class="glass-btn shop-btn interactable skin-btn" data-skin="3">
                        <div style="display:flex; align-items:center; gap:10px;">
                            <span class="shop-name">Speedboat</span>
                            <img src="images/boat3.png" style="width:24px; height:24px; object-fit:contain;">
                        </div>
                        <div class="shop-details">
                            <span class="shop-cost skin-cost" id="skin-cost-3"><img src="images/rod.png"> 500</span>
                            <span class="skin-status skin-owned" id="skin-status-3" style="display:none;">USE</span>
                        </div>
                    </button>

                    <button class="glass-btn shop-btn interactable skin-btn" data-skin="4">
                        <div style="display:flex; align-items:center; gap:10px;">
                            <span class="shop-name">Motorboat</span>
                            <img src="images/boat4.png" style="width:24px; height:24px; object-fit:contain;">
                        </div>
                        <div class="shop-details">
                            <span class="shop-cost skin-cost" id="skin-cost-4"><img src="images/rod.png"> 1000</span>
                            <span class="skin-status skin-owned" id="skin-status-4" style="display:none;">USE</span>
                        </div>
                    </button>

                    <button class="glass-btn shop-btn interactable skin-btn" data-skin="5">
                        <div style="display:flex; align-items:center; gap:10px;">
                            <span class="shop-name">Ferry</span>
                            <img src="images/boat5.png" style="width:24px; height:24px; object-fit:contain;">
                        </div>
                        <div class="shop-details">
                            <span class="shop-cost skin-cost" id="skin-cost-5"><img src="images/rod.png"> 2000</span>
                            <span class="skin-status skin-owned" id="skin-status-5" style="display:none;">USE</span>
                        </div>
                    </button>

                    <button class="glass-btn shop-btn interactable skin-btn" data-skin="6">
                        <div style="display:flex; align-items:center; gap:10px;">
                            <span class="shop-name">Ship</span>
                            <img src="images/boat6.png" style="width:24px; height:24px; object-fit:contain;">
                        </div>
                        <div class="shop-details">
                            <span class="shop-cost skin-cost" id="skin-cost-6"><img src="images/rod.png"> 3000</span>
                            <span class="skin-status skin-owned" id="skin-status-6" style="display:none;">USE</span>
                        </div>
                    </button>

                    <button class="glass-btn shop-btn interactable skin-btn" data-skin="7">
                        <div style="display:flex; align-items:center; gap:10px;">
                            <span class="shop-name">Passenger Ship</span>
                            <img src="images/boat7.png" style="width:24px; height:24px; object-fit:contain;">
                        </div>
                        <div class="shop-details">
                            <span class="shop-cost skin-cost" id="skin-cost-7"><img src="images/rod.png"> 5000</span>
                            <span class="skin-status skin-owned" id="skin-status-7" style="display:none;">USE</span>
                        </div>
                    </button>

                </div>
            </div>
        </div>
    </div>

    <div id="game-world">
        <div id="sky"></div>
        
        <div id="atmosphere">
            <img src="images/cloud.png" class="cloud" style="top: 10%; width: 120px; animation-duration: 35s; animation-delay: -15s;">
            <img src="images/cloud.png" class="cloud" style="top: 40%; width: 160px; animation-duration: 45s; animation-delay: -30s;">
            <img src="images/cloud.png" class="cloud" style="top: 20%; width: 90px; animation-duration: 55s; animation-delay: -5s;">
        </div>
        
        <div id="water-group">
            <div id="boat">
                <img src="images/boat1.png" alt="Boat">
                <div id="gold-rain-text">GOLD RAIN!</div>
            </div>
            <div id="auto-boat"><img src="images/boat1.png" alt="Auto Boat"></div> 

            <div id="fishing-line"></div>
            <div id="hook"><img src="images/hook.png" alt="Hook"></div>

            <div id="water">
                <div class="water-surface wave-back"></div>
                <div class="water-surface wave-front"></div>
                <div id="fish-container"></div>
                <div id="seabed"></div>
            </div>
        </div>
        
        <div id="floating-text-container"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
